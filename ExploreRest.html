            </section>
            <!-- Restaurant List Container -->
            <section class="flex flex-col gap-6 w-full max-w-md mx-auto">

                    class="w-full text-left bg-surface-container-lowest rounded-xl p-4 card-shadow border border-white/50 flex flex-col gap-4 transition-all duration-200 hover:scale-[1.01] hover:shadow-md cursor-pointer group focus:outline-none focus:ring-2 focus:ring-primary/50"

                    data-href="ReProfil.html"
                    data-id="alchemist"

                    tabindex="0"
                    aria-label="View details for The Alchemist Table">

                        </button>
